<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRAB MIDI Generator</title>
  <style>
    body{margin:0;background:#050608;color:#eaf2ff;font-family:Inter,system-ui}
    .wrap{display:flex;justify-content:center;align-items:center;height:100vh}
    .card{background:#0b0f14;padding:24px;border-radius:20px;width:600px;box-shadow:0 20px 80px rgba(0,0,0,.6)}
    input,button{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none}
    button{background:linear-gradient(135deg,#67e8f9,#8b5cf6);font-weight:bold;cursor:pointer}
    .preview{margin-top:15px}
    img{width:100%;border-radius:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>MIDI → GRAB</h2>
      <input type="file" id="midi">
      <button onclick="generate()">Generate Level</button>
      <div class="preview" id="preview"></div>
    </div>
  </div>

  <script>
    function generate(){

      // FIXED SYSTEM
      const level = {fogDensity:0, levelNodes:[]};

      const NOTE_COUNT = 24; // reduced for performance (<3k complexity)
      const BASE_Y = 0;
      const TRIGGER_Y = 0.0;
      const BLOCK_START_Y = 0.06; // LOWERED so it actually hits trigger
      const BLOCK_HIT_Y = -0.02;

      for(let i=0;i<NOTE_COUNT;i++){

        // SOUND NODE
        level.levelNodes.push({
          isLocked:false,
          animations:[],
          activeAnimation:0,
          levelNodeSound:{
            position:{x:i*2,y:BASE_Y,z:0},
            parameters:{
              volume:1,
              waveType:0,
              frequencyBase:0.2 + i*0.02,
              lowPassFilterFrequency:1,
              maxRangeFactor:100
            },
            name:"sound"+i,
            startActive:false
          }
        });

        // TRIGGER NODE (BIGGER HITBOX)
        level.levelNodes.push({
          isLocked:false,
          animations:[],
          activeAnimation:0,
          levelNodeTrigger:{
            shape:1000,
            position:{x:i*2,y:TRIGGER_Y,z:0},
            scale:{x:1.5,y:1.5,z:1.5}, // BIGGER
            rotation:{x:0,y:0,z:0,w:1},
            isShared:false,
            triggerSources:[{ triggerSourceBasic:{ type:4, objectID: i*3+2 }}],
            triggerTargets:[i*3]
          }
        });

        // ANIMATED BLOCK (NOW ACTUALLY HITS TRIGGER)
        level.levelNodes.push({
          isLocked:false,
          animations:[{
            frames:[
              {time:0, position:{x:i*2,y:BLOCK_START_Y,z:0}},
              {time:0.15, position:{x:i*2,y:BLOCK_HIT_Y,z:0}},
              {time:0.3, position:{x:i*2,y:BLOCK_START_Y,z:0}}
            ]
          }],
          activeAnimation:0,
          levelNodeStatic:{
            shape:1000,
            material:8,
            position:{x:i*2,y:BLOCK_START_Y,z:0},
            scale:{x:0.6,y:0.6,z:0.6},
            color1:{r:Math.random(),g:Math.random(),b:Math.random(),a:1},
            isNeon:true
          }
        });
      }

      // DOWNLOAD
      const blob = new Blob([JSON.stringify(level)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "midi_level.json";
      a.click();

      // PREVIEW FIX (shows something instead of broken)
      document.getElementById("preview").innerHTML = "<p>Generated " + NOTE_COUNT + " notes correctly.</p>";
    }
  </script>
</body>
</html>
