<script src="https://unpkg.com/@tonejs/midi@2.0.28/build/Midi.js"></script>
<script>
'use strict';

let midi = null;
let rawEvents = [];
let events = [];          // compacted note events
let pitches = [];         // unique midi numbers, sorted low→high
let pitchInfo = new Map();// midi# → { soundId, triggerId, freq, name, color, events[] }
let levelJson = null;
let songDuration = 0;

// playback
let audioCtx = null;
let playing = false;
let rafId = 0;
let playStartAC = 0;
let schedNodes = [];

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const noteName = m => NOTE_NAMES[((m%12)+12)%12] + (Math.floor(m/12)-1);
const midiFreq = m => 440 * Math.pow(2, (m-69)/12);
const pitchHue = m => ((m * 137.508) % 360);
const pitchCol = m => `hsl(${pitchHue(m)},82%,62%)`;

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.className = 'status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}
function setExpStatus(msg, cls='') {
  const el = document.getElementById('expStatus');
  el.className = 'status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

function compactEvents(list, grid = 0.04) {
  const map = new Map();

  for (const ev of list) {
    const t = Math.round(ev.time / grid) * grid;
    const d = Math.max(grid, Math.round(ev.dur / grid) * grid);
    const key = `${ev.midi}|${t.toFixed(3)}|${d.toFixed(3)}`;

    if (!map.has(key)) {
      map.set(key, { ...ev, time: t, dur: d });
    } else {
      const cur = map.get(key);
      cur.dur = Math.max(cur.dur, d);
      cur.vel = Math.max(cur.vel, ev.vel);
    }
  }

  return [...map.values()].sort((a, b) => a.time - b.time || a.midi - b.midi || a.dur - b.dur);
}

function loadBuffer(buf, name) {
  try {
    midi = new Midi(buf);
  } catch (e) {
    setStatus('Parse error: ' + e.message, 'err');
    return;
  }

  const sel = document.getElementById('trackSel');
  sel.innerHTML = '<option value="-1">All tracks</option>';
  midi.tracks.forEach((t, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `Track ${i + 1}${t.name ? ': ' + t.name : ''} (${t.notes.length} notes)`;
    sel.appendChild(o);
  });

  document.getElementById('songName').textContent = name.replace(/\.(mid|midi)$/i, '') + '.roll';
  processAndRender();
  document.getElementById('buildBtn').disabled = false;
  setStatus(`Loaded "${name}" · ${rawEvents.length} raw events → ${events.length} compacted events · ${pitches.length} unique pitches`, 'ok');
}

function processAndRender() {
  const trackIdx = parseInt(document.getElementById('trackSel').value, 10);
  const tracks = trackIdx === -1 ? midi.tracks : [midi.tracks[trackIdx]];

  const raw = [];
  for (const t of tracks) {
    for (const n of t.notes) {
      raw.push({
        midi: n.midi,
        time: n.time,
        dur: Math.max(0.04, n.duration),
        vel: n.velocity ?? 0.8
      });
    }
  }

  raw.sort((a, b) => a.time - b.time || a.midi - b.midi || a.dur - b.dur);
  rawEvents = raw;
  events = compactEvents(raw, 0.04);
  songDuration = events.length ? Math.max(...events.map(e => e.time + e.dur)) : 0;

  // Unique pitch reuse system
  pitchInfo = new Map();
  pitches = [];
  const seen = new Set();
  for (const ev of events) {
    if (!seen.has(ev.midi)) {
      seen.add(ev.midi);
      pitches.push(ev.midi);
    }
  }
  pitches.sort((a, b) => a - b);

  const P = pitches.length;
  pitches.forEach((m, idx) => {
    pitchInfo.set(m, {
      soundId: idx + 1,
      triggerId: P + idx + 1,
      freq: midiFreq(m),
      name: noteName(m),
      color: pitchCol(m),
      events: []
    });
  });
  for (const ev of events) pitchInfo.get(ev.midi).events.push(ev);

  document.getElementById('sUniq').textContent = P;
  document.getElementById('sEvts').textContent = events.length;
  document.getElementById('sDur').textContent = songDuration.toFixed(1);

  const pillsEl = document.getElementById('pills');
  pillsEl.innerHTML = '';
  const pillData = [
    ['Sound blocks', P],
    ['Trigger blocks', P],
    ['Animated blocks', 1],
    ['Total nodes', P * 2 + 1],
    ['Keyframes', events.length]
  ];
  for (const [l, v] of pillData) {
    const d = document.createElement('div');
    d.className = 'pill';
    d.innerHTML = `<b>${v}</b>${l}`;
    pillsEl.appendChild(d);
  }

  renderTable();
  renderRoll(-1);
  document.getElementById('playBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
}

function renderTable() {
  const wrap = document.getElementById('ntWrap');
  const body = document.getElementById('ntBody');
  wrap.style.display = 'block';
  body.innerHTML = '';
  for (const m of pitches) {
    const info = pitchInfo.get(m);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="ndot" style="background:${info.color}"></span></td>
      <td><b>${info.name}</b></td>
      <td>${info.freq.toFixed(1)}</td>
      <td>${info.events.length}</td>
      <td style="color:var(--m)">snd_${info.soundId}</td>
      <td style="color:var(--m)">trig_${info.triggerId}</td>
    `;
    body.appendChild(tr);
  }
}

function renderRoll(playhead) {
  const wrap = document.getElementById('cvWrap');
  const empty = document.getElementById('cvEmpty');
  const leg = document.getElementById('leg');
  const cv = document.getElementById('roll');
  const ctx = cv.getContext('2d');

  if (!events.length) {
    empty.style.display = 'flex';
    leg.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  leg.style.display = 'flex';

  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth || 600;
  const H = 300;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#07080f';
  ctx.fillRect(0, 0, W, H);

  const LABEL_W = 48;
  const pxPerSec = (W - LABEL_W) / Math.max(songDuration, 1);
  const minP = pitches[0], maxP = pitches[pitches.length - 1];
  const pitchSpan = Math.max(maxP - minP, 1);
  const laneH = Math.min(22, (H - 18) / (pitchSpan + 1));
  const pitchY = m => H - 8 - (m - minP + 0.5) * laneH;

  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for (let t = 0; t <= songDuration; t += 1) {
    const x = LABEL_W + t * pxPerSec;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
    if (t % 5 === 0 && t > 0) {
      ctx.fillStyle = 'rgba(255,255,255,.18)';
      ctx.font = `9px Space Mono, monospace`;
      ctx.fillText(t + 's', x + 2, H - 3);
    }
  }

  for (const m of pitches) {
    const info = pitchInfo.get(m);
    const y = pitchY(m);
    const isBlack = [1, 3, 6, 8, 10].includes(m % 12);

    ctx.fillStyle = isBlack ? '#0f1220' : '#141828';
    ctx.fillRect(0, y - laneH / 2 - 1, LABEL_W - 2, laneH + 2);

    ctx.fillStyle = info.color;
    ctx.font = `${Math.max(8, laneH - 3)}px Space Mono, monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(info.name, LABEL_W - 5, y + laneH * 0.38);
    ctx.textAlign = 'left';

    ctx.strokeStyle = 'rgba(255,255,255,.04)';
    ctx.beginPath();
    ctx.moveTo(LABEL_W, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  for (const ev of events) {
    const info = pitchInfo.get(ev.midi);
    const x = LABEL_W + ev.time * pxPerSec;
    const w = Math.max(2, ev.dur * pxPerSec - 1);
    const y = pitchY(ev.midi);
    const active = playhead >= ev.time && playhead <= ev.time + ev.dur;

    ctx.shadowColor = active ? info.color : 'transparent';
    ctx.shadowBlur = active ? 10 : 0;
    ctx.fillStyle = active ? info.color : info.color + '88';
    ctx.fillRect(x, y - laneH / 2 + 1, w, laneH - 2);
  }
  ctx.shadowBlur = 0;

  if (playhead >= 0) {
    const px = LABEL_W + playhead * pxPerSec;
    ctx.save();
    ctx.strokeStyle = '#ff9f4d';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff9f4d';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, H);
    ctx.stroke();
    ctx.restore();
  }
}

function buildLevel() {
  if (!events.length) {
    setStatus('No notes found.', 'err');
    return;
  }

  const spacing = parseFloat(document.getElementById('spacing').value) || 3;
  const vol = parseFloat(document.getElementById('vol').value) || 0.8;
  const atk = parseFloat(document.getElementById('atk').value) || 0.01;
  const wave = parseInt(document.getElementById('waveSel').value, 10);

  const P = pitches.length;
  const nodes = [];

  const trigPositions = new Map();
  pitches.forEach((m, idx) => {
    const x = (idx - (P - 1) / 2) * spacing;
    trigPositions.set(m, { x, y: 0, z: 0 });
  });

  // SOUND BLOCKS (unchanged node shape)
  for (const m of pitches) {
    const info = pitchInfo.get(m);
    const pos = trigPositions.get(m);

    nodes.push({
      objectID: info.soundId,
      levelNodeSound: {
        position: { x: pos.x, y: pos.y + 2, z: pos.z },
        rotation: { x: 0, y: 0, z: 0, w: 1 },
        scale: { x: 1, y: 1, z: 1 },
        startActive: false,
        parameters: {
          volume: vol,
          waveType: wave,
          envelopeAttack: atk,
          envelopeSustain: 0.85,
          envelopeRelease: 0.12,
          envelopePunch: 0,
          frequencyBase: Math.round(info.freq),
          frequencyLimit: 30,
          frequencyRamp: 0,
          frequencyDeltaRamp: 0,
          vibratoStrength: 0,
          vibratoSpeed: 0,
          pitchJumpMod: 0,
          pitchJumpSpeed: 0,
          dutyCycle: 0.5,
          dutyCycleRamp: 0,
          repeatSpeed: 0,
          flangerFrequency: 0,
          flangerDepth: 0,
          lowPassFilterFrequency: 100,
          highPassFilterFrequency: 0,
          reverbDelay: 0,
          reverbDecayFactor: 0
        },
        volume: vol,
        maxRangeFactor: 100,
        repeat: false,
        name: `sound_${info.name.replace('#', 's')}_${m}`
      }
    });
  }

  // TRIGGER BLOCKS (unchanged node shape)
  for (const m of pitches) {
    const info = pitchInfo.get(m);
    const pos = trigPositions.get(m);

    nodes.push({
      objectID: info.triggerId,
      levelNodeTrigger: {
        shape: 1000,
        position: { x: pos.x, y: pos.y, z: pos.z },
        scale: { x: 1.1, y: 1.1, z: 1.1 },
        rotation: { x: 0, y: 0, z: 0, w: 1 },
        isShared: false,
        triggerTargets: [
          {
            triggerTargetSound: {
              objectID: info.soundId,
              mode: 0
            }
          }
        ]
      }
    });
  }

  // ONE ANIMATED BLOCK, TELEPORTING TO THE TRIGGER POSITION
  const AWAY_Z = 500;
  const SNAP_DT = 0.012;
  const BLOCK_ID = P * 2 + 1;
  const frames = [];

  frames.push({
    time: 0,
    position: { x: 0, y: 0, z: AWAY_Z },
    rotation: { x: 0, y: 0, z: 0, w: 1 }
  });

  for (const ev of events) {
    const pos = trigPositions.get(ev.midi);

    frames.push({
      time: Math.max(0, ev.time - SNAP_DT),
      position: { x: pos.x, y: pos.y, z: AWAY_Z },
      rotation: { x: 0, y: 0, z: 0, w: 1 }
    });

    frames.push({
      time: ev.time,
      position: { x: pos.x, y: pos.y, z: 0 },
      rotation: { x: 0, y: 0, z: 0, w: 1 }
    });

    frames.push({
      time: ev.time + SNAP_DT,
      position: { x: pos.x, y: pos.y, z: AWAY_Z },
      rotation: { x: 0, y: 0, z: 0, w: 1 }
    });
  }

  frames.push({
    time: songDuration + 1,
    position: { x: 0, y: 0, z: AWAY_Z },
    rotation: { x: 0, y: 0, z: 0, w: 1 }
  });

  nodes.push({
    objectID: BLOCK_ID,
    animations: [
      {
        name: 'midi_sequence',
        speed: 1,
        currentFrameIndex: 0,
        frames: frames
      }
    ],
    activeAnimation: 0,
    levelNodeStatic: {
      shape: 1000,
      material: 8,
      position: { x: 0, y: 0, z: AWAY_Z },
      scale: { x: 0.8, y: 0.8, z: 0.8 },
      rotation: { x: 0, y: 0, z: 0, w: 1 },
      isNeon: true,
      isTransparent: false,
      isGrabbable: false,
      isGrapplable: false,
      isPassable: true,
      isAdditive: true,
      specularBrightness: 0.2
    }
  });

  levelJson = {
    formatVersion: 17,
    title: document.getElementById('songName').textContent.replace('.roll', ''),
    creators: 'MIDI2GRAB',
    description: `${P} sounds · ${events.length} keyframes · 1 animated block`,
    tags: ['midi', 'music', 'generated'],
    maxCheckpointCount: 10,
    fogDensity: 0,
    ambienceSettings: {
      skyZenithColor: { r: 0.04, g: 0.05, b: 0.10, a: 1 },
      skyHorizonColor: { r: 0.08, g: 0.10, b: 0.16, a: 1 },
      sunAltitude: 30,
      sunAzimuth: 270,
      sunSize: 0.5,
      fogDensity: 0
    },
    levelNodes: nodes,
    _nodeGuide: {
      soundBlocks: `objectID 1 to ${P}  (one per unique pitch)`,
      triggerBlocks: `objectID ${P + 1} to ${P * 2}  (one per unique pitch, wired to its sound)`,
      animatedBlock: `objectID ${BLOCK_ID}  (single block, ${frames.length} keyframes encoding the full MIDI timeline)`
    }
  };

  const jsonStr = JSON.stringify(levelJson, null, 2);
  document.getElementById('codeBox').textContent =
    jsonStr.slice(0, 8000) + (jsonStr.length > 8000 ? '\n\n// ... truncated for preview' : '');
  document.getElementById('dlBtn').disabled = false;
  document.getElementById('cpBtn').disabled = false;

  setStatus(
    `✓ ${P} sounds + ${P} triggers + 1 animated block (${frames.length} keyframes). Total nodes: ${nodes.length}.`,
    'ok'
  );
  setExpStatus(`${(jsonStr.length / 1024).toFixed(1)} KB · ${nodes.length} nodes`, 'ok');
}

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopPlay() {
  playing = false;
  cancelAnimationFrame(rafId);
  for (const { o, g } of schedNodes) {
    try { o.stop(); } catch {}
    try { g.disconnect(); } catch {}
  }
  schedNodes = [];
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('playBtn').disabled = !levelJson;
  document.getElementById('playTime').textContent = '';
  renderRoll(-1);
}

function startPlay() {
  if (!events.length) return;
  stopPlay();

  const ac = getAC();
  const vol = parseFloat(document.getElementById('vol').value) || 0.8;
  const wt = ['sine', 'square', 'triangle', 'sawtooth'][parseInt(document.getElementById('waveSel').value, 10)] || 'sawtooth';
  const atk = parseFloat(document.getElementById('atk').value) || 0.01;
  const now = ac.currentTime;

  schedNodes = [];
  for (const ev of events) {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = wt;
    osc.frequency.value = midiFreq(ev.midi);
    gain.gain.setValueAtTime(0, now + ev.time);
    gain.gain.linearRampToValueAtTime(vol * ev.vel, now + ev.time + atk);
    gain.gain.setValueAtTime(vol * ev.vel, now + ev.time + ev.dur - 0.05);
    gain.gain.linearRampToValueAtTime(0, now + ev.time + ev.dur);
    osc.connect(gain).connect(ac.destination);
    osc.start(now + ev.time);
    osc.stop(now + ev.time + ev.dur + 0.06);
    schedNodes.push({ o: osc, g: gain });
  }

  playing = true;
  playStartAC = now;
  document.getElementById('playBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  (function tick() {
    if (!playing) return;
    const t = ac.currentTime - playStartAC;
    document.getElementById('playTime').textContent = t.toFixed(2) + 's';
    renderRoll(t);
    if (t > songDuration + 0.8) {
      stopPlay();
      return;
    }
    rafId = requestAnimationFrame(tick);
  })();
}

function handleFile(file) {
  if (!file) return;
  if (!/\.(mid|midi)$/i.test(file.name)) {
    setStatus('Need a .mid or .midi file', 'err');
    return;
  }
  setStatus('Reading…', 'load');
  const r = new FileReader();
  r.onload = e => loadBuffer(e.target.result, file.name);
  r.onerror = () => setStatus('Could not read file', 'err');
  r.readAsArrayBuffer(file);
}

document.getElementById('midiFile').addEventListener('change', e => handleFile(e.target.files[0]));
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('ov'); });
dz.addEventListener('dragleave', () => dz.classList.remove('ov'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('ov');
  handleFile(e.dataTransfer.files[0]);
});
document.getElementById('trackSel').addEventListener('change', () => { if (midi) processAndRender(); });
document.getElementById('buildBtn').addEventListener('click', buildLevel);
document.getElementById('playBtn').addEventListener('click', startPlay);
document.getElementById('stopBtn').addEventListener('click', stopPlay);

document.getElementById('dlBtn').addEventListener('click', () => {
  if (!levelJson) return;
  const s = JSON.stringify(levelJson, null, 2);
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([s], { type: 'application/json' })),
    download: (levelJson.title || 'midi_level').replace(/\s+/g, '_') + '.json'
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  setExpStatus('Downloaded!', 'ok');
});

document.getElementById('cpBtn').addEventListener('click', async () => {
  if (!levelJson) return;
  try {
    await navigator.clipboard.writeText(JSON.stringify(levelJson, null, 2));
    setExpStatus('Copied!', 'ok');
  } catch {
    setExpStatus('Copy failed — download instead', 'err');
  }
});

let resizeT;
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    if (events.length) renderRoll(-1);
  }, 120);
});
</script>
